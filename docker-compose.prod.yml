services:
  postgres:
    image: postgres:16
    container_name: arturodev_db
    restart: always
    environment:
      POSTGRES_DB: arturodev
      POSTGRES_USER: arturodev_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arturodev_user -d arturodev"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: arturodev_backend
    restart: always
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4010:4000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: arturodev_frontend
    restart: always
    env_file: .env.production
    depends_on:
      - backend
    ports:
      - "3010:3000"
    mem_limit: 1g
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
